name: Deploy to GitHub Pages

# Deploy publishes index.html (with injected secrets) to GitHub Pages on every push to main.
# redeploy: pick up DELETE_VACANCY_URL secret (ลบตำแหน่งงาน — persist ลง SharePoint)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets (API key + Power Automate URLs)
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GET_VACANCIES_URL: ${{ secrets.GET_VACANCIES_URL }}
          POST_VACANCY_URL: ${{ secrets.POST_VACANCY_URL }}
          GET_CANDIDATES_URL: ${{ secrets.GET_CANDIDATES_URL }}
          POST_CANDIDATE_URL: ${{ secrets.POST_CANDIDATE_URL }}
          CLOSE_VACANCY_URL: ${{ secrets.CLOSE_VACANCY_URL }}
          UPDATE_CANDIDATESTATUS_URL: ${{ secrets.UPDATE_CANDIDATESTATUS_URL }}
          DELETE_CANDIDATE_URL: ${{ secrets.DELETE_CANDIDATE_URL }}
          DELETE_VACANCY_URL: ${{ secrets.HR_DELETE_VACANCY }}   # secret ตั้งชื่อ HR_DELETE_VACANCY แต่ placeholder/env ใช้ DELETE_VACANCY_URL
          GET_BRANCHMASTER_URL: ${{ secrets.GET_BRANCHMASTER_URL }}
          POST_SNAPSHOT_URL: ${{ secrets.POST_SNAPSHOT_URL }}
          GET_SNAPSHOTS_URL: ${{ secrets.GET_SNAPSHOTS_URL }}
        # ใช้ node แทน sed: แทนที่แบบ literal (split/join) — URL มี '&' ซึ่ง sed จะ treat เป็น match พังได้
        # พิมพ์สถานะ OK/MISSING ของแต่ละ secret (ไม่โชว์ค่า) และ fail ถ้า URL ที่จำเป็นหาย เพื่อกัน deploy เว็บ mock เงียบ ๆ
        # CLOSE_VACANCY_URL ยัง optional (ไม่อยู่ใน required) — ถ้ายังไม่ตั้ง closeVacancy() จะ fallback ไป POST_VACANCY_URL
        run: |
          node -e '
            const fs = require("fs");
            const keys = ["CLAUDE_API_KEY","GET_VACANCIES_URL","POST_VACANCY_URL","GET_CANDIDATES_URL","POST_CANDIDATE_URL","CLOSE_VACANCY_URL","UPDATE_CANDIDATESTATUS_URL","DELETE_CANDIDATE_URL","DELETE_VACANCY_URL","GET_BRANCHMASTER_URL","POST_SNAPSHOT_URL","GET_SNAPSHOTS_URL"];
            const required = ["GET_VACANCIES_URL","POST_VACANCY_URL","GET_CANDIDATES_URL","POST_CANDIDATE_URL"];
            for (const k of keys) console.log((process.env[k] ? "OK   set    " : "XX   MISSING") + " " + k);
            const missing = required.filter(k => !process.env[k]);
            if (missing.length) {
              console.error("\nMissing required secrets: " + missing.join(", "));
              console.error("เพิ่มเป็น Repository secrets ที่ Settings > Secrets and variables > Actions (ไม่ใช่ Environment secret) ให้ชื่อตรงเป๊ะ");
              process.exit(1);
            }
            let h = fs.readFileSync("index.html", "utf8");
            for (const k of keys) h = h.split("__" + k + "__").join(process.env[k] || "");
            fs.writeFileSync("index.html", h);
            console.log("\nInjected secrets into index.html");
          '

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
